<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VibeLoveStoryBot</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Arial', sans-serif;
    }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #ffbfd5, #c9a0ff);
    }

    .container {
      position: relative;
      width: 420px;
      height: 700px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .heart-bg {
      position: absolute;
      top: 80px;
      width: 280px;
      height: 250px;
      background: linear-gradient(135deg, #ffb6d9, #b987ff);
      transform: rotate(-45deg);
      border-radius: 40px;
      opacity: 0.4;
      filter: blur(2px);
    }

    .heart-bg::before,
    .heart-bg::after {
      content: '';
      position: absolute;
      width: 280px;
      height: 250px;
      background: inherit;
      border-radius: 50%;
    }

    .heart-bg::before {
      top: -140px;
      left: 0;
    }

    .heart-bg::after {
      left: 140px;
      top: 0;
    }

    .pets {
      position: relative;
      width: 100%;
      height: 300px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 80px;
      z-index: 2;
    }

    .pet {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      position: relative;
      animation: float 2s ease-in-out infinite;
      box-shadow: 0 10px 25px rgba(0,0,0,0.12);
    }

    .dog {
      background: #ffe1c7;
    }

    .cat {
      background: #b8b8d1;
      animation-delay: 1s;
    }

    .ear {
      width: 40px;
      height: 40px;
      position: absolute;
      top: -10px;
      border-radius: 10px;
      transform: rotate(45deg);
    }

    .dog .ear {
      background: #ffd2b2;
    }

    .cat .ear {
      background: #8d8daa;
    }

    .ear.left {
      left: 10px;
    }

    .ear.right {
      right: 10px;
    }

    .eye {
      width: 10px;
      height: 10px;
      background: #222;
      border-radius: 50%;
      position: absolute;
      top: 45px;
    }

    .eye.left {
      left: 35px;
    }

    .eye.right {
      right: 35px;
    }

    .mouth {
      width: 24px;
      height: 12px;
      border-bottom: 3px solid #333;
      border-radius: 0 0 20px 20px;
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
    }

    .heart {
      position: absolute;
      width: 35px;
      height: 35px;
      background: #ff6fa8;
      transform: rotate(-45deg);
      bottom: -15px;
      left: 50%;
      margin-left: -17px;
      animation: pulse 1.5s infinite;
    }

    .heart::before,
    .heart::after {
      content: '';
      position: absolute;
      width: 35px;
      height: 35px;
      background: inherit;
      border-radius: 50%;
    }

    .heart::before {
      top: -17px;
      left: 0;
    }

    .heart::after {
      left: 17px;
      top: 0;
    }

    .title {
      margin-top: 40px;
      font-size: 46px;
      font-weight: bold;
      color: white;
      text-shadow: 0 4px 10px rgba(0,0,0,0.2);
      z-index: 2;
    }

    .loading-container {
      margin-top: 40px;
      width: 320px;
      height: 28px;
      background: rgba(255,255,255,0.4);
      border-radius: 20px;
      overflow: hidden;
      position: relative;
      backdrop-filter: blur(6px);
      z-index: 2;
    }

    .loading-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #ff93b7, #ffcee0);
      border-radius: 20px;
      animation: loading 6s infinite ease-in-out;
    }

    .loading-heart {
      position: absolute;
      top: -10px;
      left: 0;
      width: 40px;
      height: 40px;
      animation: moveHeart 6s infinite ease-in-out;
    }

    .loading-heart::before,
    .loading-heart::after {
      content: '';
      position: absolute;
      width: 20px;
      height: 32px;
      background: #ff5e9e;
      border-radius: 20px 20px 0 0;
    }

    .loading-heart::before {
      left: 20px;
      transform: rotate(-45deg);
      transform-origin: 0 100%;
    }

    .loading-heart::after {
      left: 0;
      transform: rotate(45deg);
      transform-origin: 100% 100%;
    }

    .subtitle {
      margin-top: 24px;
      font-size: 24px;
      color: white;
      opacity: 0.95;
      z-index: 2;
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0px);
      }
      50% {
        transform: translateY(-15px);
      }
    }

    @keyframes pulse {
      0%, 100% {
        transform: rotate(-45deg) scale(1);
      }
      50% {
        transform: rotate(-45deg) scale(1.15);
      }
    }

    @keyframes loading {
      0% {
        width: 0%;
      }
      100% {
        width: 100%;
      }
    }

    @keyframes moveHeart {
      0% {
        left: -10px;
      }
      100% {
        left: 290px;
      }
    }

  </style>
</head>
<body>

  <div class="container">

    <div class="heart-bg"></div>

    <div class="pets">

      <div class="pet dog">
        <div class="ear left"></div>
        <div class="ear right"></div>
        <div class="eye left"></div>
        <div class="eye right"></div>
        <div class="mouth"></div>
        <div class="heart"></div>
      </div>

      <div class="pet cat">
        <div class="ear left"></div>
        <div class="ear right"></div>
        <div class="eye left"></div>
        <div class="eye right"></div>
        <div class="mouth"></div>
        <div class="heart"></div>
      </div>

    </div>

    <div class="title">VibeLoveStoryBot</div>

    <div class="loading-container">
      <div class="loading-bar"></div>
      <div class="loading-heart"></div>
    </div>

    <div class="subtitle">Загружаем любовь... 💖</div>

  </div>



<script>
  setTimeout(() => {
    document.querySelector('.container').innerHTML = `

      <div class="game-hud">

        <div class="top-bar">
          <div class="profile-card">
            <div class="mini-pet dog-mini"></div>
            <div>
              <div class="hud-title">VibeLoveStoryBot</div>
              <div class="hud-sub">365 дней вместе 💖</div>
            </div>
          </div>

          <div class="coins">✨ 1240</div>
        </div>

        <div class="main-pets">
          <div class="hud-pet dog-big floating">
            <div class="heart"></div>
          </div>

          <div class="hud-pet cat-big floating delay">
            <div class="heart purple-heart"></div>
          </div>
        </div>

        <div class="status-card">
          <div class="status-title">Уровень любви</div>

          <div class="hud-bar">
            <div class="hud-fill"></div>
          </div>

          <div class="status-text">78% • Следующий этап через 5 дней</div>
        </div>

        <div class="menu-grid">
          <div class="menu-btn">🌱 Питомцы</div>
          <div class="menu-btn">🎁 Подарки</div>
          <div class="menu-btn">💌 История</div>

}

}

</style>



<script>
  setTimeout(() => {
    document.querySelector('.container').innerHTML = `

      <div class="game-hud">

        <div class="top-bar">
          <div class="profile-card">
            <div class="mini-pet dog-mini"></div>
            <div>
              <div class="hud-title">VibeLoveStoryBot</div>
              <div class="hud-sub" id="love-days">365 дней вместе 💖</div>
            </div>
          </div>

          <div class="coins">✨ 1240</div>
        </div>

        <div class="main-pets">

          <div class="pet-wrapper">
            <div class="hud-pet dog-big floating" id="dog"></div>
            <div class="pet-name" id="dog-name">Бобик</div>
          </div>

          <div class="pet-wrapper">
            <div class="hud-pet cat-big floating delay" id="cat"></div>
            <div class="pet-name" id="cat-name">Мурка</div>
          </div>

        </div>

        <div class="status-card">
          <div class="status-title">Уровень любви</div>

          <div class="hud-bar">
            <div class="hud-fill"></div>
          </div>

          <div class="status-text">78% • Следующий этап через 5 дней</div>
        </div>

        <div class="menu-grid">
          <div class="menu-btn" data-action="pets">🌱 Питомцы</div>
          <div class="menu-btn" data-action="gifts">🎁 Подарки</div>
          <div class="menu-btn" data-action="history">💌 История</div>
          <div class="menu-btn" data-action="achievements">🏆 Достижения</div>
        </div>

      </div>

    `;

    // CLICK EVENTS MENU
    document.querySelectorAll('.menu-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const action = btn.dataset.action;

        if (action === 'pets') {
          alert('Ухаживайте за питомцами 💖');
        }
        if (action === 'gifts') {
          alert('Подарки скоро будут доступны 🎁');
        }
        if (action === 'history') {
          alert('История ваших дней любви 💌');
        }
        if (action === 'achievements') {
          alert('Достижения в разработке 🏆');
        }
      });
    });

    // PET NAMING
    document.getElementById('dog').addEventListener('click', () => {
      const name = prompt('Назовите вашего пёсика 🐶');
      if (name) document.getElementById('dog-name').innerText = name;
    });

    document.getElementById('cat').addEventListener('click', () => {
      const name = prompt('Назовите вашу кошечку 🐱');
      if (name) document.getElementById('cat-name').innerText = name;
    });

  }, 6500);
</script>
